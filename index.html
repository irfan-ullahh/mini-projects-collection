<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To do app</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="main.css">
</head>

<body
    class="h-screen w-full flex items-center justify-center bg-gradient-to-br from-indigo-950 via-purple-950 to-zinc-950">
    <div class="bg-white/5 border border-white/10 rounded-lg w-md px-3 py-5 h-[90vh] overflow-y-scroll no-scroll-bar">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-white font-bold text-2xl">Your To Do</h1>
            <div class="text-white/40 text-xs">
                <span id="task-count">0</span> tasks
            </div>
        </div>
        <div class="w-full top-0 left-0 flex items-end gap-4 mt-4 mb-10">
            <input id="todo-input"
                class="text-white border-b border-white/20 outline-0 w-full p-2 duration-150 focus:border-white"
                type="text" placeholder="Add new task" />
            <button id="todo-button"
                class="text-xs text-white bg-white/5 border border-white/10 p-1 rounded-lg outline-none cursor-pointer hover:bg-white/10 transition-all duration-200">
                <svg xmlns="http://www.w3.org/2000/svg" width="18px" height="18px" viewBox="0 0 24 24">
                    <path d="M0 0h24v24H0z" fill="none" />
                    <path fill="currentColor"
                        d="M18 12.998h-5v5a1 1 0 0 1-2 0v-5H6a1 1 0 0 1 0-2h5v-5a1 1 0 0 1 2 0v5h5a1 1 0 0 1 0 2" />
                </svg>
            </button>
        </div>
        <ul id="todo-list" class="space-y-3">
        </ul>
    </div>
</body>
<script src="main.js"></script>

</html>
